<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1200" role="img" aria-labelledby="title desc">
  <title id="title">Ethernum Gyro placeholder</title>
  <desc id="desc">A brass and green sigil placeholder for Gyro Zeppeli until final character art is assigned.</desc>
