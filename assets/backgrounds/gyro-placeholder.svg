    <radialGradient id="bg" cx="50%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#243720"/>
      <stop offset="45%" stop-color="#0b140f"/>
      <stop offset="100%" stop-color="#050706"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" x2="100%">
      <stop offset="0%" stop-color="#7d6726"/>
      <stop offset="50%" stop-color="#d7bd63"/>
      <stop offset="100%" stop-color="#6d561f"/>
    </linearGradient>
    <filter id="glow">
