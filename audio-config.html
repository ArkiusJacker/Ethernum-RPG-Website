<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Configurar Áudio - ETHERNUM</title>
  <link rel="stylesheet" href="ethernum-shared.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
      color: #e0e0e0;
      padding: 2rem;
      min-height: 100vh;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      background: rgba(0, 0, 0, 0.6);
      border: 1px solid rgba(200, 168, 75, 0.3);
      border-radius: 12px;
      padding: 2rem;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
    }

    h1 {
      color: #c8a84b;
      margin-bottom: 1.5rem;
      text-align: center;
      font-size: 1.8rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    .config-group {
      margin-bottom: 2rem;
    }

    .config-group label {
      display: block;
      margin-bottom: 0.8rem;
      color: #c8a84b;
      font-weight: 600;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .config-group input[type="text"],
    .config-group input[type="file"],
    .config-group select {
      width: 100%;
      padding: 0.75rem 1rem;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(200, 168, 75, 0.3);
      border-radius: 6px;
      color: #e0e0e0;
      font-size: 0.9rem;
      font-family: 'Courier New', monospace;
      transition: all 0.2s ease;
    }

    .config-group input[type="text"]:focus,
    .config-group input[type="file"]:focus,
    .config-group select:focus {
      outline: none;
      border-color: #c8a84b;
      background: rgba(200, 168, 75, 0.1);
      box-shadow: 0 0 12px rgba(200, 168, 75, 0.2);
    }

    .help-text {
      font-size: 0.8rem;
      color: rgba(224, 224, 224, 0.6);
      margin-top: 0.5rem;
      font-style: italic;
    }

    .button-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-top: 2rem;
    }

    button {
      padding: 0.9rem 1.5rem;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      transition: all 0.3s ease;
      font-family: 'Segoe UI', sans-serif;
    }

    .btn-save {
      background: linear-gradient(135deg, #c8a84b 0%, #a08a3a 100%);
      color: #1a1a1a;
    }

    .btn-save:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 16px rgba(200, 168, 75, 0.3);
    }

    .btn-test {
      background: rgba(200, 168, 75, 0.2);
      color: #c8a84b;
      border: 1px solid #c8a84b;
    }

    .btn-test:hover {
      background: rgba(200, 168, 75, 0.3);
      box-shadow: 0 4px 12px rgba(200, 168, 75, 0.2);
    }

    .btn-reset {
      background: rgba(196, 43, 43, 0.2);
      color: #e05555;
      border: 1px solid #e05555;
      grid-column: 1 / -1;
    }

    .btn-reset:hover {
      background: rgba(196, 43, 43, 0.3);
      box-shadow: 0 4px 12px rgba(196, 43, 43, 0.2);
    }

    .status-message {
      padding: 1rem;
      border-radius: 6px;
      margin-top: 1.5rem;
      font-size: 0.9rem;
      display: none;
      animation: slideDown 0.3s ease;
    }

    .status-message.success {
      background: rgba(46, 125, 50, 0.2);
      border: 1px solid rgba(76, 175, 80, 0.3);
      color: #76c97d;
      display: block;
    }

    .status-message.error {
      background: rgba(196, 43, 43, 0.2);
      border: 1px solid rgba(244, 67, 54, 0.3);
      color: #e05555;
      display: block;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .section-divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(200, 168, 75, 0.3), transparent);
      margin: 2rem 0;
    }

    .preset-buttons {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.8rem;
    }

    .preset-btn {
      padding: 0.6rem 1rem;
      background: rgba(200, 168, 75, 0.1);
      border: 1px solid rgba(200, 168, 75, 0.2);
      border-radius: 4px;
      color: #c8a84b;
      cursor: pointer;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      transition: all 0.2s ease;
    }

    .preset-btn:hover {
      background: rgba(200, 168, 75, 0.2);
      border-color: #c8a84b;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎵 Configurar Áudio</h1>

    <!-- Método 1: URL da Música -->
    <div class="config-group">
      <label for="musicUrl">URL da Música de Fundo</label>
      <input type="text" id="musicUrl" placeholder="./audio/background-music.mp3 ou https://...">
      <p class="help-text">Cole aqui o caminho local (./audio/music.mp3) ou URL remota (https://...)</p>
    </div>

    <div class="section-divider"></div>

    <!-- Método 2: Upload de Arquivo -->
    <div class="config-group">
      <label for="audioFile">Ou Upload de Arquivo</label>
      <input type="file" id="audioFile" accept="audio/*">
      <p class="help-text">Selecione um arquivo MP3, WAV, ou OGG do seu computador</p>
    </div>

    <div class="section-divider"></div>

    <!-- Opções -->
    <div class="config-group">
      <label for="allowMultiple">Opções</label>
      <label style="display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem;">
        <input type="checkbox" id="allowMultiple">
        <span>Permitir múltiplos cards abertos ao mesmo tempo</span>
      </label>
      <label style="display: flex; align-items: center; gap: 0.5rem;">
        <input type="checkbox" id="enableCustomAudio" checked>
        <span>Ativar áudio customizado</span>
      </label>
    </div>

    <div class="section-divider"></div>

    <!-- Presets -->
    <div class="config-group">
      <label>Presets de Áudio</label>
      <div class="preset-buttons">
        <button class="preset-btn" data-preset="ambient">Ambient Synth</button>
        <button class="preset-btn" data-preset="piano">Piano Clássico</button>
        <button class="preset-btn" data-preset="orchestral">Orquestral</button>
        <button class="preset-btn" data-preset="desert">Deserto (Gyro)</button>
      </div>
    </div>

    <!-- Botões de Ação -->
    <div class="button-group">
      <button class="btn-test" id="testBtn">🔊 Testar Áudio</button>
      <button class="btn-save" id="saveBtn">💾 Salvar Configuração</button>
      <button class="btn-reset" id="resetBtn">🔄 Resetar Padrão</button>
    </div>

    <div class="status-message" id="statusMessage"></div>
  </div>

  <script>
    class AudioConfigManager {
      constructor() {
        this.musicUrl = localStorage.getItem('ethernum-music-url') || '';
        this.allowMultiple = localStorage.getItem('ethernum-allow-multiple') === 'true';
        this.enableCustomAudio = localStorage.getItem('ethernum-enable-custom') !== 'false';
        this.audioContext = null;
        this.loadUI();
        this.setupEventListeners();
      }

      loadUI() {
        document.getElementById('musicUrl').value = this.musicUrl;
        document.getElementById('allowMultiple').checked = this.allowMultiple;
        document.getElementById('enableCustomAudio').checked = this.enableCustomAudio;
      }

      setupEventListeners() {
        document.getElementById('saveBtn').addEventListener('click', () => this.save());
        document.getElementById('testBtn').addEventListener('click', () => this.test());
        document.getElementById('resetBtn').addEventListener('click', () => this.reset());
        document.getElementById('audioFile').addEventListener('change', (e) => this.handleFileUpload(e));

        document.querySelectorAll('.preset-btn').forEach(btn => {
          btn.addEventListener('click', () => this.loadPreset(btn.dataset.preset));
        });
      }

      handleFileUpload(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (e) => {
          const base64 = e.target.result;
          document.getElementById('musicUrl').value = base64;
          this.showStatus('✅ Arquivo carregado! Clique em Salvar para aplicar.', 'success');
        };
        reader.readAsDataURL(file);
      }

      loadPreset(preset) {
        const presets = {
          ambient: './audio/ambient-synth.mp3',
          piano: './audio/piano-classical.mp3',
          orchestral: './audio/orchestral-bg.mp3',
          desert: './audio/desert-wind.mp3'
        };
        document.getElementById('musicUrl').value = presets[preset] || '';
        this.showStatus(`📻 Preset "${preset}" carregado. Clique em Salvar para aplicar.`, 'success');
      }

      save() {
        const musicUrl = document.getElementById('musicUrl').value.trim();
        const allowMultiple = document.getElementById('allowMultiple').checked;
        const enableCustomAudio = document.getElementById('enableCustomAudio').checked;

        localStorage.setItem('ethernum-music-url', musicUrl);
        localStorage.setItem('ethernum-allow-multiple', allowMultiple);
        localStorage.setItem('ethernum-enable-custom', enableCustomAudio);

        this.showStatus('✅ Configurações salvas! Atualize a página do personagem para aplicar.', 'success');
        setTimeout(() => {
          window.location.href = './mestre-panel.html';
        }, 2000);
      }

      test() {
        const musicUrl = document.getElementById('musicUrl').value.trim();
        if (!musicUrl) {
          this.showStatus('❌ Insira uma URL ou carregue um arquivo primeiro!', 'error');
          return;
        }

        const audio = new Audio();
        audio.src = musicUrl;
        audio.volume = 0.3;
        audio.play()
          .then(() => this.showStatus('🎵 Tocando... Volume em 30%', 'success'))
          .catch(() => this.showStatus('❌ Erro ao reproduzir. Verifique a URL ou formato.', 'error'));

        setTimeout(() => audio.pause(), 3000);
      }

      reset() {
        if (confirm('Resetar todas as configurações de áudio?')) {
          localStorage.removeItem('ethernum-music-url');
          localStorage.removeItem('ethernum-allow-multiple');
          localStorage.removeItem('ethernum-enable-custom');
          this.loadUI();
          this.showStatus('🔄 Configurações resetadas ao padrão.', 'success');
        }
      }

      showStatus(message, type) {
        const msg = document.getElementById('statusMessage');
        msg.textContent = message;
        msg.className = `status-message ${type}`;
        setTimeout(() => msg.classList.remove(type), 5000);
      }
    }

    new AudioConfigManager();
  </script>
</body>
</html>
